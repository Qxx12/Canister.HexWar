<svg xmlns="http://www.w3.org/2000/svg" viewBox="7.92 7.75 32.16 32.5">
  <!--
    3 pointy-top hexes, circumradius R=9, forming a valid adjacent cluster.
    Centers: A=(24,17.25)  B=(16.21,30.75)  C=(31.79,30.75)
    All shared edges are exact: A↔B, A↔C, B↔C.
    Player colors: p0 blue / p1 red / p2 green.
  -->

  <!-- Hex A — top, dusty steel blue -->
  <polygon
    points="24,8.25 31.79,12.75 31.79,21.75 24,26.25 16.21,21.75 16.21,12.75"
    fill="#7c9faf" stroke="#3a2e28" stroke-width="1" stroke-linejoin="round"/>

  <!-- Hex B — bottom-left, dusty terracotta -->
  <polygon
    points="16.21,21.75 24,26.25 24,35.25 16.21,39.75 8.42,35.25 8.42,26.25"
    fill="#c4907c" stroke="#3a2e28" stroke-width="1" stroke-linejoin="round"/>

  <!-- Hex C — bottom-right, muted sage -->
  <polygon
    points="31.79,21.75 39.58,26.25 39.58,35.25 31.79,39.75 24,35.25 24,26.25"
    fill="#8aab80" stroke="#3a2e28" stroke-width="1" stroke-linejoin="round"/>
</svg>
